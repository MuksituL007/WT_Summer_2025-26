<!DOCTYPE html>
<html>
<head>
<title>Web Page</title>
</head>
<body>
 

<h1>Internship Confirmation Form</h1>
<p>Career Development Office - Final Year Internship Coordination</p>

<form>
<p>Enter your Name: <input type="text"></p>
<p>Enter your Email: <input type="email"></p>

<p>Preferred Internship Type:
        <br/>
 <input type="radio" name="internship" id="onsite"> On-Site
     <br/>
 <input type="radio" name="internship" id="remote"> Remote
</p>

<p>Internship Duration:
<select>
<option>6 Weeks</option>
<option>3 Months</option>
</select>
</p>

<p>Skills of Interest:
    <br/>
 <input type="checkbox"> Web Development
<br/>
 <input type="checkbox"> Data Analysis
<br/>
 <input type="checkbox"> Mobile Apps
</p>

<input type="submit">

</form>

</body>
</html>
